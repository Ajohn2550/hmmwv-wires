  -
    - XF1: [1, 2, 4, 5, 6, 8] # Main Branch
    - WF2: [1-6]
    - XF3: [1-6] # Passenger Branch
  -
    - XF2: [1-7] # Driver Branch
    - WF3: [1-7]
    - XF4: [1-7] # Driver head light
  -
    - XF2: [5, 7] # Driver Branch
    - WF4: [1, 2]
    - XF6: [1, 2] # Driver marker light
  -
    - XF2: [3, 7] # Driver Branch
    - WF5: [1, 2]
    - XF8: [1, 2] # Driver Blackout Drive Light
  -
    - XF3: [1-6] # Passenger Branch
    - WF6: [1-6]
    - XF5: [1-6] # Passenger head light
  -
    - XF3: [4, 6] # Passenger Branch
    - WF7: [1, 2]
    - XF7: [1, 2] # Passenger Marker Light
# Connections to the Rear of the Vehicle
  -
    - XR1: [1, 3, 4, 5, 6] # Main Branch
    - WR1: [1-5]
    - XR2: [1-5] # Driver Branch
  -
    - XR1: [1, 2, 4, 5, 6] # Main Branch
    - WR2: [1-5]
    - XR3: [1-5] # Passenger Branch
  -
    - XR1: [5, 3, 5, 6, 1, 4, 5, 2, 6] # Main Branch
    - WR3: [1-9]
    - XR8: [1, 2, 3, 4, 5, 6, 7, 8, 10] # Trailer Branch
  -
    - XR2: [1-5] # Driver Branch
    - WR4: [1-5]
    - XR4: [1-5]  # Driver Tail Light
  -
    - XR2: [1, 5] # Driver Branch
    - WR5: [1, 2]
    - XR6: [1, 2] # Driver Marker Light
  -
    - XR3: [1-5] # Passenger Branch
    - WR6: [1-5]
    - XR5: [1-5] # Passenger Tail Light
  -   
    - XR3: [1, 5] # Passenger Branch
    - WR7: [1, 2]
    - XR7: [1, 2] # Passenger Marker Light
