connectors:

  X1:
    notes: "Main Connector to the Dash box"
    pinlabels: ['17', '18', '19', '20', '21', '23', '24', '460', '22-460', '461', '22-461', '90']
    additional_components:
      - type: crimp
        subtype: splice
        qty: 2
  X-MKR: &marker
    notes: "Marker Light Connector"
    pinlabels: ['21', '90']
    additional_components:
      - type: crimp
        subtype: Male Packard
      - type: crimp
        subtype: Female Packard
# Connectors to the Front of the Vehicle
  XF1:
    notes: "Front Branch pass through connections"
    pinlabels: ['17', '18', '19', '20', '21', '460', '461', '90']
    additional_components:
      - type: crimp
        subtype: splice
        qty: 5
  XF2:
    notes: "Front Driver Branch pass through connections"
    pinlabels: ['17', '18', '19', '20', '21', '461', '90']
    additional_components:
      - type: crimp
        subtype: splice
        qty: 4
  XF3:
    notes: "Front Passenger Branch pass through connections"
    pinlabels: ['17', '18', '20', '21', '460', '90']
    additional_components:
      - type: crimp
        subtype: splice
        qty: 2
  XF4:
    notes: "Front Driver head light connector"
    pinlabels: ['17', '18', '19', '20', '21', '461', '90']
    additional_components:
      - type: crimp
        subtype: Male Packard
        qty: 6
      - type: crimp
        subtype: Female Packard
        qty: 1
  XF5:
    notes: "Front Passenger head light connector"
    pinlabels: ['17', '18', '20', '21', '460', '90']
    additional_components:
      - type: crimp
        subtype: Male Packard
        qty: 5
      - type: crimp
        subtype: Female Packard
        qty: 1
  XF6:
    <<: *marker
    notes: "Front Driver marker light connector"
  XF7:
    <<: *marker
    notes: "Front Passenger marker light connector"
  XF8:
    notes: "Front Blackout Drive Light connector"
    pinlabels: ['19', '90']
    additional_components:
      - type: crimp
        subtype: Male Packard
      - type: crimp
        subtype: Female Packard
# Connectors to the Rear of the Vehicle
  XR1:
    notes: "Rear Branch pass through connections"
    pinlabels: ['21', '22-460', '22-461', '23', '24', '90']
    additional_components:
      - type: crimp
        subtype: splice
        qty: 10
  XR2:
    notes: "Rear Driver Branch pass through connections"
    pinlabels: ['21', '22-461', '23', '24', '90']
    additional_components:
      - type: crimp
        subtype: splice
        qty: 2
  XR3:
    notes: "Rear Passenger Branch pass through connections"
    pinlabels: ['21', '22-460', '23', '24', '90']
    additional_components:
      - type: crimp
        subtype: splice
        qty: 2
  XR4:
    notes: "Rear Driver tail light connector"
    pinlabels: ['21', '22-461', '23', '24', '90']
    additional_components:
      - type: crimp
        subtype: Male Packard
        qty: 4
      - type: crimp
        subtype: Female Packard
        qty: 1
  XR5:
    notes: "Rear Passenger tail light connector"
    pinlabels: ['21', '22-460', '23', '24', '90']
    additional_components:
      - type: crimp
        subtype: Male Packard
        qty: 4
      - type: crimp
        subtype: Female Packard
        qty: 1
  XR6:
    <<: *marker
    notes: "Rear Driver marker light connector"
  XR7:
    <<: *marker
    notes: "Rear Passenger marker light connector"
  XR8:
    notes: "Trailer Connector"
    pinlabels: ['24A', '22-461', '24B', '90A', '21', '23', '24C', '22-460', 'NA-A', '90B', 'NA-B', 'NA-C']
    mpn: MS75021-1
cables:
  W1:
    category: bundle
    gauge: 14 AWG
    length: 10 ft
    wirecount: 8
  W2:
    category: bundle
    gauge: 14 AWG
    length: 10 ft
    wirecount: 6
# Cables to the Front of the Vehicle
  WF1:
    category: bundle
    gauge: 14 AWG
    length: 3 ft
    wirecount: 7
  WF2:
    category: bundle
    gauge: 14 AWG
    length: 3 ft
    wirecount: 6
  WF3:
    category: bundle
    gauge: 14 AWG
    length: 1 ft
    wirecount: 7
  WF4:
    category: bundle
    gauge: 14 AWG
    length: 2 ft
    wirecount: 2
  WF5:
    category: bundle
    gauge: 14 AWG
    length: 1 ft
    wirecount: 2
  WF6:
    category: bundle
    gauge: 14 AWG
    length: 1 ft
    wirecount: 6
  WF7:
    category: bundle
    gauge: 14 AWG
    length: 2 ft
    wirecount: 2
# Cables for the Rear of the Vehicle
# Rear Driver Branch Cable
  WR1:
    category: bundle
    gauge: 14 AWG
    length: 3 ft
    wirecount: 5
# Rear Passenger Branch Cable
  WR2:
    category: bundle
    gauge: 14 AWG
    length: 3 ft
    wirecount: 5
# Trailer Branch Cable
  WR3:
    category: bundle
    gauge: 14 AWG
    length: 2 ft
    wirecount: 9
    wirelabels: ['24A', '22-461', '24B', '90A', '21', '23', '24C', '22-460', '90B']
# Rear Driver Tail Light
  WR4:
    category: bundle
    gauge: 14 AWG
    length: 1 ft
    wirecount: 5
# Rear Driver Marker Light
  WR5:
    category: bundle
    gauge: 14 AWG
    length: 1 ft
    wirecount: 2
# Rear Passenger Tail Light
  WR6:
    category: bundle
    gauge: 14 AWG
    length: 1 ft
    wirecount: 5
# Rear Passenger Marker Light
  WR7:
    category: bundle
    gauge: 14 AWG
    length: 1 ft
    wirecount: 2
connections:
  -
    - X1: [1, 2, 3, 4, 5, 8, 10, 12]
    - W1: [1-8]
    - XF1: [1-8]
  -
    - X1: [5, 9, 11, 6, 7, 12]
    - W2: [1-6]
    - XR1: [1-6]
# Connections to the Front of the Vehicle
  -
    - XF1: [1, 2, 3, 4, 5, 7, 8]
    - WF1: [1-7]
